<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
</head>
<body>
    <nav>
        <a href="../index.html">Back to Home</a>
    </nav>

    <h2>Registration Form</h2>

    <form action="../results.html" method="GET">
      <fieldset>
        <legend>Demographic Info</legend>
        <label>Full Name <input type="text" placeholder="Enter your name" name="fullname" /></label>
        <br><br>
        <label>Sex
          <select name="sex">
            <option value="1">male</option>
            <option value="2">female</option>
            <option value="3">other</option>
          </select>
        </label>
        <br><br>
        <label for="dob">Date Of Birth</label>
        <input type="date" value="2000-01-01" name="dob" id="dob" />
      </fieldset>

      <fieldset>
        <legend>Contact Info</legend>
        <label>Email <input type="email" name="email" /></label>
        <br><br>
        <label>County
          <input list="counties" name="county" />
          <datalist id="counties">
            <option value="Caroni"></option>
            <option value="Mayaro"></option>
            <option value="Nariva"></option>
            <option value="Saint Andrew"></option>
            <option value="Saint David"></option>
            <option value="Saint George"></option>
            <option value="Saint Patrick"></option>
            <option value="Victoria"></option>
          </datalist>
        </label>
        <br><br>
        <label>Telephone <input type="tel" name="telephone" /></label>
      </fieldset>

      <fieldset>
        <legend>Courses</legend>
        <label><input type="checkbox" name="courses" value="info1601" checked/> Info 1601</label>
        <label><input type="checkbox" name="courses" value="comp1602"/> COMP 1602</label>
        <label><input type="checkbox" name="courses" value="comp1603"/> COMP 1603</label>
        <label><input type="checkbox" name="courses" value="comp1604"/> COMP 1604</label>
      </fieldset>

      <br>
      <input type="submit" value="signup" />
    </form>
</body>
</html>
